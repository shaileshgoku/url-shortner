<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="card wide">
<h2>My URLs</h2>

<table>
<tr>
<th>Short URL</th>
<th>Original</th>
<th>Action</th>
</tr>

{% for code,url in data %}
<tr>
<td class="url-cell">
<a href="{{ request.host_url }}{{code}}" target="_blank">
{{ request.host_url }}{{code}}
</a>
</td>

<td class="url-cell">{{url}}</td>

<td><a href="/delete/{{code}}">Delete</a></td>
</tr>
{% endfor %}
</table>

<a href="/">Back</a>
</div>
